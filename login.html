<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Туры на Камчатку</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Montserrat:wght@600&family=Gadugi:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .auth-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #29343e 0%, #1a2229 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px;
        }
        .auth-container {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            padding: 50px 40px;
            border: 1px solid rgba(255, 189, 78, 0.2);
            backdrop-filter: blur(10px);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .auth-logo img {
            max-width: 200px;
        }
        .auth-title {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 30px;
        }
        .auth-title .accent {
            color: #ffbd4e;
        }
        .auth-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.5);
            transition: all 0.3s;
            font-weight: 600;
        }
        .auth-tab.active {
            color: #ffbd4e;
            border-bottom: 2px solid #ffbd4e;
        }
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            font-size: 16px;
            color: #fff;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #ffbd4e;
            background: rgba(255, 255, 255, 0.15);
        }
        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: #ffbd4e;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            color: #000;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .auth-btn:hover {
            background: #ffaa2e;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 189, 78, 0.3);
        }
        .auth-links {
            text-align: center;
            margin-top: 25px;
        }
        .auth-links a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        .auth-links a:hover {
            color: #ffbd4e;
        }
        .error-message {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid rgba(231, 76, 60, 0.3);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            color: #e74c3c;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        .success-message {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            color: #4caf50;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        .password-wrapper {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255, 255, 255, 0.5);
        }
        @media (max-width: 576px) {
            .auth-container {
                padding: 30px 25px;
            }
            .auth-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-logo">
            <img src="img/v0_2119.png" alt="Logo">
        </div>
        <div class="auth-title">
            <span>ДОБРО ПОЖАЛОВАТЬ</span><br>
            <span class="accent">В ПУТЕШЕСТВИЕ</span>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <div class="auth-tabs">
            <div class="auth-tab active" data-tab="login">Вход</div>
            <div class="auth-tab" data-tab="register">Регистрация</div>
        </div>

        <!-- Форма входа -->
        <form id="loginForm" class="auth-form active">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="example@mail.com" required>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <div class="password-wrapper">
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                    <span class="toggle-password" onclick="togglePassword('loginPassword')">👁</span>
                </div>
            </div>
            <button type="submit" class="auth-btn">Войти</button>
            <div class="auth-links">
                <a href="#" id="forgotPasswordLink">Забыли пароль?</a>
            </div>
        </form>

        <!-- Форма регистрации -->
        <form id="registerForm" class="auth-form">
            <div class="form-group">
                <label>Полное имя</label>
                <input type="text" id="regFullName" placeholder="Иван Иванов" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="example@mail.com" required>
            </div>
            <div class="form-group">
                <label>Телефон</label>
                <input type="tel" id="regPhone" placeholder="+7 999 123-45-67">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <div class="password-wrapper">
                    <input type="password" id="regPassword" placeholder="••••••••" required>
                    <span class="toggle-password" onclick="togglePassword('regPassword')">👁</span>
                </div>
            </div>
            <div class="form-group">
                <label>Подтверждение пароля</label>
                <div class="password-wrapper">
                    <input type="password" id="regConfirmPassword" placeholder="••••••••" required>
                    <span class="toggle-password" onclick="togglePassword('regConfirmPassword')">👁</span>
                </div>
            </div>
            <button type="submit" class="auth-btn">Зарегистрироваться</button>
            <div class="auth-links">
                <span style="color: rgba(255,255,255,0.4); font-size: 14px;">Регистрируясь, вы соглашаетесь с </span>
                <a href="#">правилами сайта</a>
            </div>
        </form>
    </div>
</div>

<script>
    const API_URL = '/api';

    function showError(message) {
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        setTimeout(() => {
            errorDiv.style.display = 'none';
        }, 5000);
    }

    function showSuccess(message) {
        const successDiv = document.getElementById('successMessage');
        successDiv.textContent = message;
        successDiv.style.display = 'block';
        setTimeout(() => {
            successDiv.style.display = 'none';
        }, 3000);
    }

    async function login(email, password) {
        try {
            const response = await fetch(`${API_URL}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await response.json();

            if (data.success) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                showSuccess('Вход выполнен успешно!');
                setTimeout(() => {
                    window.location.href = 'profile.html';
                }, 1500);
            } else {
                showError(data.error || 'Ошибка входа');
            }
        } catch (error) {
            showError('Ошибка соединения с сервером');
        }
    }

    async function register(full_name, email, phone, password) {
        try {
            const response = await fetch(`${API_URL}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ full_name, email, phone, password })
            });
            const data = await response.json();

            if (data.success) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                showSuccess('Регистрация успешна!');
                setTimeout(() => {
                    window.location.href = 'profile.html';
                }, 1500);
            } else {
                showError(data.error || 'Ошибка регистрации');
            }
        } catch (error) {
            showError('Ошибка соединения с сервером');
        }
    }

    // Переключение табов
    document.querySelectorAll('.auth-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');

            const tabName = tab.dataset.tab;
            document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
            document.getElementById(`${tabName}Form`).classList.add('active');
        });
    });

    // Обработка формы входа
    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        login(email, password);
    });

    // Обработка формы регистрации
    document.getElementById('registerForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const full_name = document.getElementById('regFullName').value;
        const email = document.getElementById('regEmail').value;
        const phone = document.getElementById('regPhone').value;
        const password = document.getElementById('regPassword').value;
        const confirmPassword = document.getElementById('regConfirmPassword').value;

        if (password !== confirmPassword) {
            showError('Пароли не совпадают');
            return;
        }

        if (password.length < 6) {
            showError('Пароль должен содержать минимум 6 символов');
            return;
        }

        register(full_name, email, phone, password);
    });

    // Забыли пароль
    document.getElementById('forgotPasswordLink').addEventListener('click', (e) => {
        e.preventDefault();
        showError('Функция восстановления пароля временно недоступна. Свяжитесь с поддержкой.');
    });

    function togglePassword(inputId) {
        const input = document.getElementById(inputId);
        if (input.type === 'password') {
            input.type = 'text';
        } else {
            input.type = 'password';
        }
    }

    // Проверка, авторизован ли пользователь
    const token = localStorage.getItem('token');
    if (token) {
        window.location.href = 'profile.html';
    }
</script>
<script src="/chat-widget.js"></script>
</body>
</html>
